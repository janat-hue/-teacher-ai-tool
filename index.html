<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Nástroj pro návrh úkolů</title>

<style>
body{
font-family: Arial;
max-width:900px;
margin:auto;
padding:40px;
line-height:1.6;
}

textarea{
width:100%;
height:120px;
margin-bottom:20px;
}

button{
padding:10px 20px;
font-size:16px;
}

.section{
margin-bottom:30px;
}
</style>

</head>

<body>

<h1>Nástroj pro návrh úkolů</h1>

<p>
Model: OVU → H1–H3 → AIAS → OSAP → AI stopa
</p>

<div class="section">
<h2>1. Původní zadání úkolu</h2>
<textarea placeholder="Vlož původní zadání úkolu"></textarea>
</div>

<div class="section">
<h2>2. Analýza úkolu</h2>

<label>Hloubka myšlení</label>
<select>
<option>H1 – reprodukce</option>
<option>H2 – aplikace</option>
<option>H3 – přenos / tvorba</option>
</select>

<br><br>

<label>Riziko outsourcingu na AI</label>
<select>
<option>nízké</option>
<option>střední</option>
<option>vysoké</option>
</select>

</div>

<div class="section">
<h2>3. Redesign úkolu</h2>
<textarea placeholder="Navrhni úpravu zadání"></textarea>
</div>

<button>Generovat doporučení</button>

</body>
</html>
